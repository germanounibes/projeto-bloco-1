<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <h1>Card.Gen</h1>
        <section id="botoes">
            <button onclick="modoEscuro()" id="Dark"><img src="moon.png" alt="dark" height="20rem"></button>
            <button onclick="modoClaro()" id="Light"><img src="sun.png" alt="light" height="20rem"></button>
        </section>
    </header>
    <main>
        <div id="formudiv">
            <section id="formulario">
                <form id="meuForm">
                    <label for="nome">Nome:</label>
                    <input type=" text" id="nome" name="nome" placeholder="Nome"><br><br>
                    <label for="cargo">Cargo:</label>
                    <input type="text" id="cargo" name="cargo" placeholder="Cargo"><br><br>
                    <label for="empresa">Empresa</label>
                    <input type="text" id="empresa" name="empresa" placeholder="Nome da Empresa"><br><br>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="E-mail"><br><br>
                </form>
                <button class="botao" onclick="fun()">Enviar</button>
                <br>
                <button class="botao" onclick="window.print()" id="envia">Imprimir</button>
                <br>
                <input type="color" id="colorPicker" value="#000000">
            </section>
        </div>
        <br>
        <div id="cardiv">
            <section id="carta">
                <h2 id="nomeH">Nome Completo</h2>

                <p id="cargoH">Seu Cargo</p>

                <section class="info">
                    <span id="empresaH">Nome da Empresa</span>
                    <br>
                    <span id="emailH">seu@email.com</span>
                </section>
            </section>
        </div>
    </main>
    <br><br>
    <script src="script.js">
    </script>
</body>

</html>
