<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <h1>Card.Gen</h1>
        <div id="botoes">
            <button>Dark</button>
            <button>Light</button>
        </div>
    </header>
    <div id="formulario">
        <form id="meuForm">
            <input type=" text" id="nome" name="nome" placeholder="Nome Completo"><br><br>

            <input type="text" id="cargo" name="cargo" placeholder="Cargo"><br><br>

            <input type="text" id="empresa" name="empresa" placeholder="Nome da Empresa"><br><br>

            <input type="email" id="email" name="email" placeholder="E-mail"><br><br>
        </form>
        <button class="botao" onclick="fun()">Enviar</button>
        <br>
        <button class="botao" onclick="window.print()" id="envia">Imprimir</button>
        <br>
        <input type="color" id="colorPicker" value="#000000">
    </div>
    <br>
    <div id="carta">
        <h2 id="nomeH">Nome Completo</h2>

        <p id="cargoH">Seu Cargo</p>

        <div class="info">
            <span id="empresaH">Nome da Empresa</span>
            <br>
            <span id="emailH">seu@email.com</span>
        </div>
    </div>
    <br><br>
    <script>
        function fun() {
            var nomeV = document.getElementById('nome').value;
            var cargoV = document.getElementById('cargo').value;
            var empresaV = document.getElementById('empresa').value;
            var emailV = document.getElementById('email').value;

            document.getElementById('nomeH').innerText = (nomeV);
            document.getElementById('cargoH').innerText = (cargoV);
            document.getElementById('empresaH').innerText = (empresaV);
            document.getElementById('emailH').innerText = (emailV);
        };
        const colorPicker = document.getElementById("colorPicker");
        const component = document.getElementById("carta");

        colorPicker.addEventListener("input", (event) => {
            const cor = event.target.value;
            // Estrutura: X Y Blur Cor
            component.style.boxShadow = `inset 25px 25px ${cor}`;
        });

    </script>
</body>

</html>
