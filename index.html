<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <h1>Card.Gen</h1>
        <div id="botoes">
            <button onclick="modoEscuro()" id="Dark"><img src="moon.png" alt="dark" height="20rem"></button>
            <button onclick="modoClaro()" id="Light"><img src="sun.png" alt="light" height="20rem"></button>
        </div>
    </header>
    <div id="formulario">
        <form id="meuForm">
            <input type=" text" id="nome" name="nome" placeholder="Nome Completo"><br><br>

            <input type="text" id="cargo" name="cargo" placeholder="Cargo"><br><br>

            <input type="text" id="empresa" name="empresa" placeholder="Nome da Empresa"><br><br>

            <input type="email" id="email" name="email" placeholder="E-mail"><br><br>
        </form>
        <button class="botao" onclick="fun()">Enviar</button>
        <br>
        <button class="botao" onclick="window.print()" id="envia">Imprimir</button>
        <br>
        <input type="color" id="colorPicker" value="#000000">
    </div>
    <br>
    <div id="carta">
        <h2 id="nomeH">Nome Completo</h2>

        <p id="cargoH">Seu Cargo</p>

        <div class="info">
            <span id="empresaH">Nome da Empresa</span>
            <br>
            <span id="emailH">seu@email.com</span>
        </div>
    </div>
    <br><br>
    <script>
        //sistema dos valores do formulario
        function fun() {
            var nomeV = document.getElementById('nome').value;
            var cargoV = document.getElementById('cargo').value;
            var empresaV = document.getElementById('empresa').value;
            var emailV = document.getElementById('email').value;

            document.getElementById('nomeH').innerText = (nomeV);
            document.getElementById('cargoH').innerText = (cargoV);
            document.getElementById('empresaH').innerText = (empresaV);
            document.getElementById('emailH').innerText = (emailV);
        };
        //sistema do colorpicker
        const colorPicker = document.getElementById("colorPicker");
        const component = document.getElementById("carta");
        colorPicker.addEventListener("input", (event) => {
            const cor = event.target.value;
            component.style.boxShadow = `inset 25px 25px ${cor}`;
        });
        //função modo dark
        function modoEscuro() {
            // Fundo e Título
            document.body.style.backgroundImage = "linear-gradient(135deg, #121212 0%, #1a2a6c 100%)";
            document.querySelector('h1').style.color = "#4a9eff";

            // Inputs e Botões
            var inputs = document.querySelectorAll('input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].style.backgroundColor = "#333";
                inputs[i].style.color = "white";
            }

            var botoes = document.querySelectorAll('.botao');
            for (var j = 0; j < botoes.length; j++) {
                botoes[j].style.backgroundColor = "#000";
                botoes[j].style.color = "#4a9eff";
            }
        }
        //função modo light
        function modoClaro() {
            // Fundo e Título
            document.body.style.backgroundImage = "linear-gradient(135deg, #f5f7fa 0%, rgb(150, 191, 255) 100%)";
            document.querySelector('h1').style.color = "#2758c4";

            // Inputs e Botões
            var inputs = document.querySelectorAll('input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].style.backgroundColor = "#FFF";
                inputs[i].style.color = "";
            }

            var botoes = document.querySelectorAll('.botao');
            for (var j = 0; j < botoes.length; j++) {
                botoes[j].style.backgroundColor = "rgb(105, 163, 255)";
                botoes[j].style.color = "white";
            }
        }
    </script>
</body>

</html>
